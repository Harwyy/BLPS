spring:
  application.name: blps
  config:
    import: optional:classpath:application-local.yml
    datasource:
      url: ${DB_URL:jdbc:h2:mem:fallbackdb}
      username: ${DB_USERNAME:sa}
      password: ${DB_PASSWORD:}
  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        transaction:
          jta:
            platform: org.hibernate.service.jta.platform.internal.JBossAppServerJtaPlatform
  jta:
    enabled: true
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
    non-blocking-redelivery: true
    packages:
      trust-all: true
  jms:
    pub-sub-domain: false
server:
  port: 8080